<!DOCTYPE html>
<html>
  <head>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css"
    />
    <title>Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>

  <body>
    <nav>
      <div class="nav-wrapper teal" style="padding-left: 10px">
        <a href="#!" class="brand-logo">Ajax Demo</a>
      </div>
    </nav>
    <main class="row" style="padding: 40px">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>name</th>
            <th>Type</th>
            <th>website</th>
          </tr>
        </thead>
        <tbody id="result"></tbody>
      </table>
    </main>
    <script>
      function drawTable(records) {
        let result = document.querySelector('#result');
        let html = '';

        for (let record of records) {
          html += `<tr>
          <td>${record.id}</td>
          <td>${record.name}</td>
          <td>${record.brewery_type}</td>
          <td>${record.website_url ?? ''}</td>
        </tr>`;
        }

        result.innerHTML = html;
      }

      async function loadData() {
        const fallbackRecords = [
          {
            id: 3042,
            name: "Mason's Brewing Company",
            brewery_type: 'micro',
            website_url: 'http://www.masonsbrewingcompany.com',
          },
          {
            id: 1808,
            name: 'Barrie Brewing Company',
            brewery_type: 'planning',
            website_url: null,
          },
          {
            id: 6135,
            name: 'Harty Brewing Company',
            brewery_type: 'brewpub',
            website_url: 'http://www.hartybrewco.com',
          },
          {
            id: 7283,
            name: 'Sunken City Brewing Co',
            brewery_type: 'micro',
            website_url: 'http://www.sunkencitybeer.com',
          },
          {
            id: 2407,
            name: 'Hairy Cow Brewing Co, LLC',
            brewery_type: 'planning',
            website_url: 'http://www.hairycowbrewing.com',
          },
        ];

        try {
          const response = await fetch('https://api.openbrewerydb.org/breweries?per_page=5');
          const records = await response.json();
          drawTable(records);
        } catch (error) {
          console.error('Unable to fetch brewery data, using fallback records.', error);
          drawTable(fallbackRecords);
        }
      }

      loadData();
    </script>
  </body>
</html>
