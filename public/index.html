<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css"
    />
    <title>AJAX Brewery Demo</title>
  </head>

  <body class="grey lighten-4">
    <nav>
      <div class="nav-wrapper teal" style="padding-left: 10px">
        <a href="#!" class="brand-logo">AJAX Demo - Brewery Search</a>
      </div>
    </nav>

    <main class="container" style="padding: 32px 0">
      <div class="card">
        <div class="card-content">
          <span class="card-title">Search Results for "harry"</span>
          <p id="status" class="grey-text text-darken-1">Loading brewery data...</p>
          <div class="responsive-table" style="margin-top: 1rem">
            <table class="striped highlight">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Name</th>
                  <th>Type</th>
                  <th>City</th>
                  <th>State</th>
                  <th>Country</th>
                  <th>Website</th>
                </tr>
              </thead>
              <tbody id="result"></tbody>
            </table>
          </div>
        </div>
      </div>
    </main>

    <script>
      function drawTable(records) {
        let result = document.querySelector('#result');
        let status = document.querySelector('#status');
        let html = '';

        for (let record of records) {
          html += `<tr>
            <td>${record.id ?? ''}</td>
            <td>${record.name ?? ''}</td>
            <td>${record.brewery_type ?? ''}</td>
            <td>${record.city ?? ''}</td>
            <td>${record.state ?? ''}</td>
            <td>${record.country ?? ''}</td>
            <td>${record.website_url ? `<a href="${record.website_url}" target="_blank" rel="noreferrer">Visit</a>` : ''}</td>
          </tr>`;
        }

        result.innerHTML = html;
        status.textContent = `Loaded ${records.length} record(s).`;
      }

      // function MUST be declared async
      async function getData(url) {
        try {
          let response = await fetch(url); //1. Send http request and get response
          let result = await response.json(); //2. Get data from response
          drawTable(result); //3. Do something with the data
        } catch (e) {
          console.log(e); //catch and log any errors
          document.querySelector('#status').textContent = 'Unable to load data.';
        }
      }

      getData('https://api.openbrewerydb.org/breweries/search?query=harry');
    </script>
  </body>
</html>
