<!DOCTYPE html>
<html>
  <head>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css"
    />
    <title>Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>

  <body>
    <nav>
      <div class="nav-wrapper teal" style="padding-left: 10px">
        <a href="#!" class="brand-logo">Ajax Demo</a>
      </div>
    </nav>

    <main class="row" style="padding: 40px">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>name</th>
            <th>Type</th>
            <th>website</th>
          </tr>
        </thead>
        <tbody id="result"></tbody>
      </table>

      <section id="details" style="margin-top: 2rem"></section>
    </main>

    <script>
      async function getData(url, renderFun) {
        try {
          const response = await fetch(url);
          const result = await response.json();
          renderFun(result);
        } catch (e) {
          console.log(e);
        }
      }

      function drawTable(records) {
        const result = document.querySelector('#result');
        let html = '';

        for (const record of records) {
          html += `<tr id="${record.id}">
            <td>${record.id}</td>
            <td>${record.name}</td>
            <td>${record.brewery_type}</td>
            <td>
              <a href="#${record.id}" onclick="getData('https://api.openbrewerydb.org/breweries/${record.id}', drawDetails)">
                View More Details
              </a>
            </td>
          </tr>`;
        }

        result.innerHTML = html;
      }

      function drawDetails(record) {
        const details = document.querySelector('#details');

        details.innerHTML = `
          <div class="card">
            <div class="card-content">
              <span class="card-title">${record.name}</span>
              <p><strong>ID:</strong> ${record.id}</p>
              <p><strong>Type:</strong> ${record.brewery_type ?? 'N/A'}</p>
              <p><strong>City:</strong> ${record.city ?? 'N/A'}</p>
              <p><strong>State:</strong> ${record.state ?? 'N/A'}</p>
              <p><strong>Phone:</strong> ${record.phone ?? 'N/A'}</p>
              <p>
                <strong>Website:</strong>
                ${record.website_url ? `<a href="${record.website_url}" target="_blank" rel="noreferrer">${record.website_url}</a>` : 'N/A'}
              </p>
            </div>
          </div>
        `;
      }

      getData('https://api.openbrewerydb.org/breweries', drawTable);
    </script>
  </body>
</html>
